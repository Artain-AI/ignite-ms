services:
  ignite-ms:
    image: ghcr.io/artain-ai/ignite-ms:latest
    build: .
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/data
      - ignite-ms-cache:/opt/ignite-ms/cache
    command: >
      embed
      --model intfloat/e5-small-v2
      --input /data/input.jsonl
      --output /data/embeddings.npy
      --gpus all

volumes:
  ignite-ms-cache:
